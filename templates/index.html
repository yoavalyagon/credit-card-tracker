<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Credit Card Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
    <div class="container mt-5 mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h2 class="mb-0">💳 Credit Card Expense Tracker</h2>
            </div>
            <div class="card-body">
                <!-- Display Total -->
                <div class="alert alert-info" role="alert">
                    <h4 class="alert-heading">Total Expenses</h4>
                    <h1 id="totalAmount" class="text-center" style="font-size: 2.5rem; color: #0d47a1; font-weight: bold;">
                        0.00
                    </h1>
                    <p class="text-center mb-0">NIS</p>
                </div>

                <!-- Expense Input -->
                <div class="input-group mb-3">
                    <input
                        type="number"
                        id="expenseAmount"
                        class="form-control form-control-lg"
                        placeholder="Enter amount in NIS"
                        step="0.01"
                        min="0"
                    >
                    <button
                        class="btn btn-success btn-lg"
                        id="addBtn"
                        onclick="addExpense()"
                    >
                        ➕ Add Expense
                    </button>
                </div>

                <!-- Tell Yoav Button -->
                <div class="d-grid gap-2 mb-3">
                    <button
                        class="btn btn-warning btn-lg"
                        id="notifyBtn"
                        onclick="openMailTo()"
                    >
                        📢 Tell Yoav
                    </button>
                </div>

                <!-- Reset Button -->
                <div class="d-grid">
                    <button
                        class="btn btn-danger btn-lg"
                        id="resetBtn"
                        onclick="confirmReset()"
                    >
                        🔄 Reset Counter
                    </button>
                </div>

                <!-- Last Updated -->
                <p class="text-muted text-center mt-4 mb-0" id="lastUpdated"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatDate(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleString('en-US');
        }

        function updateTotal() {
            fetch('/api/state')
                .then(r => r.json())
                .then(data => {
                    const total = data.total.toFixed(2);
                    document.getElementById('totalAmount').textContent = total;

                    // Update last updated time
                    const lastUpdated = document.getElementById('lastUpdated');
                    if (data.last_updated) {
                        lastUpdated.textContent = `Last updated: ${formatDate(data.last_updated)}`;
                    }
                })
                .catch(err => console.error('Error updating total:', err));
        }

        function addExpense() {
            const input = document.getElementById('expenseAmount');
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) {
                alert('Please enter a positive amount');
                return;
            }

            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.textContent = 'Adding...';

            fetch('/api/add-expense', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({amount})
            })
            .then(r => r.json())
            .then(data => {
                addBtn.disabled = false;
                addBtn.textContent = '➕ Add Expense';

                if (data.success) {
                    input.value = '';
                    updateTotal();
                    alert(`✅ Expense added!\nTotal: ${data.total.toFixed(2)} NIS`);
                } else {
                    alert('❌ Error: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                addBtn.disabled = false;
                addBtn.textContent = '➕ Add Expense';
                alert('❌ Connection error: ' + err.message);
            });
        }

        function openMailTo() {
            fetch('/api/state')
                .then(r => r.json())
                .then(data => {
                    const total = data.total.toFixed(2);
                    const subject = encodeURIComponent(`Credit card tracker - ${total} NIS`);
                    const body = encodeURIComponent(`Hi Yoav,\n\nThe credit card expenses are now at ${total} NIS.\n\nKamil`);
                    const mailtoLink = `mailto:yoavalyagon@gmail.com?subject=${subject}&body=${body}`;
                    window.location.href = mailtoLink;
                })
                .catch(err => console.error('Error:', err));
        }

        function confirmReset() {
            if (!confirm('Reset the counter to 0? This is done after card reload.')) {
                return;
            }

            const resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';

            fetch('/api/reset', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({})
            })
            .then(r => r.json())
            .then(data => {
                resetBtn.disabled = false;
                resetBtn.textContent = '🔄 Reset Counter';

                if (data.success) {
                    updateTotal();
                    alert('✅ Counter reset successfully!');
                } else {
                    alert('❌ Error: ' + (data.error || 'Unknown error'));
                }
            })
            .catch(err => {
                resetBtn.disabled = false;
                resetBtn.textContent = '🔄 Reset Counter';
                alert('❌ Connection error: ' + err.message);
            });
        }

        // Load initial state
        updateTotal();
        // Refresh every 30 seconds
        setInterval(updateTotal, 30000);

        // Allow Enter key to add expense
        document.getElementById('expenseAmount').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addExpense();
        });
    </script>
</body>
</html>
